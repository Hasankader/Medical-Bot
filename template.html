<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مترجم المحاضرات التفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&family=Roboto&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', 'Cairo', sans-serif; margin: 0; padding-bottom: 80px; background: #f4f7f6; }
        .content { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-right: 5px solid #0056b3; }
        .en { font-size: 1.2rem; color: #333; line-height: 1.6; text-align: left; direction: ltr; margin-bottom: 10px; }
        .ar { font-size: 1.1rem; color: #0056b3; font-weight: bold; background: #eef2f7; padding: 10px; border-radius: 8px; }
        .word { cursor: pointer; border-bottom: 1px dashed #0056b3; transition: 0.2s; }
        .word:hover { background: #e3f2fd; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; z-index: 100;}
        .btn { background: #0056b3; color: white; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .sheet { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 1000; }
        .sheet-box { background: white; width: 100%; padding: 25px; border-radius: 25px 25px 0 0; text-align: center; }
        .word-header { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 5px; direction: ltr; }
    </style>
</head>
<body>
    <div class="content" id="app"></div>
    <div class="nav">
        <button class="btn" onclick="move(1)">التالي</button>
        <span id="pageInfo" style="font-weight:bold; margin-top:10px;"></span>
        <button class="btn" onclick="move(-1)">السابق</button>
    </div>
    
    <div class="sheet" id="sheet" onclick="this.style.display='none'">
        <div class="sheet-box" onclick="event.stopPropagation()">
            <div class="word-header">
                <h2 id="wEn" style="color:#0056b3; margin: 0;"></h2>
                <button onclick="playAudio()" style="background:none; border:none; font-size:2rem; cursor:pointer; padding:0;">🔊</button>
            </div>
            
            <p id="wAr" style="font-size: 1.4rem; font-weight: bold; margin-top: 10px;"></p>
            <button onclick="reverso()" style="background:#222; color:white; padding:12px; border-radius:8px; width:100%; border:none; font-family:'Cairo'; font-size: 1.1rem; cursor: pointer;">بحث مفصل في Reverso 🔍</button>
            <p style="font-size:0.9rem; color:gray; margin-top:15px; line-height: 1.5;">
                لتصحيح المعنى، أرسل للبوت في التليكرام:<br>
                <strong style="color: #d32f2f;">الكلمة = المعنى الصحيح</strong>
            </p>
        </div>
    </div>

    <script>
        const dict = {{DICTIONARY_DATA}};
        const pages = {{PAGES_DATA}};
        let cur = 0;

        function render() {
            const area = document.getElementById('app');
            if (pages.length === 0) return;
            const data = pages[cur];
            document.getElementById('pageInfo').innerText = `${cur + 1} / ${pages.length}`;
            let h = '';
            data.content.forEach(item => {
                let inter = item.text.split(' ').map(w => {
                    let clean = w.replace(/[^\w]/g, '').toLowerCase();
                    return clean.length > 2 ? `<span class="word" onclick="show('${clean}')">${w}</span>` : w;
                }).join(' ');
                h += `<div class="card"><div class="en">${inter}</div><div class="ar">${item.trans}</div></div>`;
            });
            area.innerHTML = h; 
            window.scrollTo(0,0);
        }

        function show(w) {
            document.getElementById('wEn').innerText = w;
            document.getElementById('wAr').innerText = dict[w] || "غير متوفر بالقاموس حالياً";
            document.getElementById('sheet').style.display = 'flex';
        }

        function reverso() {
            window.open(`https://context.reverso.net/translation/english-arabic/${document.getElementById('wEn').innerText}`);
        }

        // دالة نطق الكلمة
        function playAudio() {
            const word = document.getElementById('wEn').innerText;
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US'; // اللكنة الأمريكية
                utterance.rate = 0.9; // تبطيء الصوت شوية حتى يكون واضح
                window.speechSynthesis.speak(utterance);
            } else {
                alert("عذراً، متصفحك لا يدعم ميزة النطق الصوتي.");
            }
        }

        function move(d) {
            if(pages[cur+d]) { cur+=d; render(); }
        }
        render();
    </script>
</body>
</html>
